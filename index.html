<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ken Serikawa | Backend Developer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="shortcut icon" href="./img/favicon.ico" type="image/x-icon">
    <link rel="icon" href="./img/favicon.ico" type="image/x-icon">
    <!-- 
                       ',
            .-`-,\__
              ."`   `,    
            .'_.  ._  `;.
        __ / `      `  `.\ .--.
       /--,| 0)   0)     )`_.-,)
      |    ;.-----.__ _-');   /
       '--./         `.`/  `"`
          :   '`      |.      
          | \     /  //         
           \ '---'  /'        
            `------' \  
            _/       `--...
    -->
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-alt); }
        ::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
        html { scrollbar-width: thin; scrollbar-color: var(--muted) var(--bg-alt); }

        /* Dracula Dark (default) */
        :root {
            --bg: #1a1b26;
            --bg-alt: #13141c;
            --text: #a9b1d6;
            --muted: #565f89;
            --accent: #b4a0d6;
            --prism: #7a6faa;
            --mint: #4a9a6a;
            --warm: #b0a070;
            --rose: #a0607a;
            --orange: #b08a5a;
            --red: #a05050;
            --selection: rgba(55, 58, 80, 0.5);
            --tag-border: rgba(86, 95, 137, 0.2);
            --tag-hover: rgba(180, 160, 214, 0.08);
            --glow1: rgba(122, 111, 170, 0.04);
            --glow2: rgba(180, 160, 214, 0.03);
            --font: 'JetBrains Mono', monospace;
            --fw-body: 300;
            --fw-heading: 600;
            --fw-cmd: 600;
        }

        /* Light theme */
        [data-theme="light"] {
            --bg: #f8f8f2;
            --bg-alt: #eee8d5;
            --text: #282a36;
            --muted: #7c6f8a;
            --accent: #7c5cbf;
            --prism: #7c3aed;
            --mint: #1a7a3a;
            --warm: #b45309;
            --rose: #c2185b;
            --orange: #d97706;
            --red: #dc2626;
            --selection: rgba(109, 76, 145, 0.15);
            --tag-border: rgba(40, 42, 54, 0.12);
            --tag-hover: rgba(124, 92, 191, 0.1);
            --glow1: rgba(124, 58, 237, 0.04);
            --glow2: rgba(124, 92, 191, 0.03);
            --fw-body: 400;
            --fw-heading: 700;
            --fw-cmd: 700;
        }

        html { scroll-behavior: smooth; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            font-size: 14px;
            font-weight: var(--fw-body);
            line-height: 1.7;
            min-height: 100vh;
            overflow-x: hidden;
            transition: background 0.3s, color 0.3s;
        }

        ::selection {
            background: var(--selection);
        }

        /* Background atmosphere */
        body::before {
            content: '';
            position: fixed;
            width: 500px; height: 500px;
            background: radial-gradient(circle, var(--glow2) 0%, transparent 70%);
            top: -10%; right: -8%;
            z-index: 0;
            pointer-events: none;
            animation: drift 22s ease-in-out infinite;
        }
        body::after {
            content: '';
            position: fixed;
            width: 400px; height: 400px;
            background: radial-gradient(circle, var(--glow1) 0%, transparent 70%);
            bottom: -5%; left: -8%;
            z-index: 0;
            pointer-events: none;
            animation: drift 28s ease-in-out infinite reverse;
        }
        @keyframes drift {
            0%, 100% { transform: translate(0,0); }
            50% { transform: translate(25px, -15px); }
        }

        /* Theme toggle */
        .theme-toggle {
            position: fixed;
            top: 0.8rem;
            right: 0.8rem;
            z-index: 100;
            background: none;
            border: none;
            font-family: var(--font);
            font-size: 0.7rem;
            color: var(--muted);
            cursor: pointer;
            padding: 4px 6px;
            line-height: 1;
            transition: color 0.2s;
        }
        .theme-toggle:hover {
            color: var(--accent);
        }

        /* Terminal container */
        .term {
            position: relative;
            z-index: 1;
            max-width: 820px;
            margin: 0 auto;
            padding: 2.5rem 1.5rem 4rem;
        }

        /* Every line in the terminal */
        .line {
            white-space: pre-wrap;
            word-break: break-word;
            padding: 1px 0;
        }

        .line.mt { margin-top: 1.2em; }
        .line.mb { margin-bottom: 0.3em; }
        .line.gap { margin-top: 2em; }

        /* Prompt */
        .p-user { color: var(--mint); }
        .p-device { color: var(--muted); }
        .p-path { color: var(--accent); }
        .p-dollar { color: var(--muted); }

        /* Syntax colors */
        .cmd { color: var(--text); font-weight: var(--fw-cmd); }
        .keyword { color: var(--prism); }
        .string { color: var(--warm); }
        .func { color: var(--accent); }
        .comment { color: var(--muted); font-style: italic; }
        .output { color: var(--text); }
        .ok { color: var(--mint); }
        .heading { color: var(--accent); font-weight: var(--fw-heading); }
        .subheading { color: var(--prism); }
        .link { color: var(--orange); text-decoration: none; transition: color 0.2s; }
        .link:hover { color: var(--warm); }
        .dim { color: var(--muted); }
        .bright { color: var(--text); }
        .indent { padding-left: 2ch; }

        /* Fake terminal input */
        .term-input {
            background: none;
            border: none;
            outline: none;
            color: var(--text);
            font-family: var(--font);
            font-size: inherit;
            font-weight: var(--fw-body);
            caret-color: var(--mint);
            width: 40ch;
            max-width: 50%;
        }

        /* Cursor */
        .cursor {
            display: inline-block;
            width: 8px; height: 1.15em;
            background: var(--mint);
            vertical-align: text-bottom;
            animation: blink 0.8s step-end infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Boot phase: lines hidden until revealed */
        .boot-line { opacity: 0; }
        .boot-line.show { opacity: 1; }

        /* Content phase: hidden until revealed in chunks */
        .content-phase { display: none; }
        .content-phase.entered { display: block; }
        .chunk { display: none; }
        .chunk.visible { display: block; }

        /* Copied toast */
        .toast {
            color: var(--mint);
            font-size: 0.85em;
            opacity: 0;
            transition: opacity 0.3s;
            margin-left: 1ch;
        }
        .toast.on { opacity: 1; }

        /* Responsive */
        @media (max-width: 600px) {
            body { font-size: 12.5px; }
            .term { padding: 1.5rem 1rem 3rem; }
        }

        @media (max-width: 380px) {
            body { font-size: 11.5px; }
            .term { padding: 1rem 0.7rem 2rem; }
        }
    </style>
</head>
<body>

<button class="theme-toggle" id="themeToggle" aria-label="Toggle theme"></button>

<div class="term">

    <!-- ═══ BOOT PHASE ═══ -->
    <div id="boot"></div>

    <!-- ═══ CONTENT PHASE ═══ -->
    <div id="content" class="content-phase"></div>

</div>

<script>
// ── Theme toggle ──
(function() {
    var stored = localStorage.getItem('theme');
    if (stored) document.documentElement.setAttribute('data-theme', stored);
    var btn = document.getElementById('themeToggle');
    function updateLabel() {
        var isDark = document.documentElement.getAttribute('data-theme') !== 'light';
        btn.textContent = isDark ? '[ light ]' : '[ dark ]';
    }
    updateLabel();
    btn.addEventListener('click', function(e) {
        e.stopPropagation();
        var isDark = document.documentElement.getAttribute('data-theme') !== 'light';
        var next = isDark ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
        updateLabel();
    });
})();

// ── Helpers ──
function makeEl(tag, cls, text) {
    var el = document.createElement(tag);
    if (cls) el.className = cls;
    if (text !== undefined) el.textContent = text;
    return el;
}

function makeSpan(cls, text) { return makeEl('span', cls, text); }

function makeLine(cls) {
    var d = document.createElement('div');
    d.className = 'line' + (cls ? ' ' + cls : '');
    return d;
}

function getUserAgent() {
    var ua = navigator.userAgent;
    var os = 'unknown', br = 'unknown';
    if (ua.includes('Windows')) os = 'win';
    else if (ua.includes('Mac')) os = 'mac';
    else if (ua.includes('Android')) os = 'android';
    else if (ua.includes('Linux')) os = 'linux';
    else if (ua.includes('iOS') || ua.includes('iPhone')) os = 'ios';
    if (ua.includes('Chrome') && !ua.includes('Edge')) br = 'chrome';
    else if (ua.includes('Firefox')) br = 'firefox';
    else if (ua.includes('Safari') && !ua.includes('Chrome')) br = 'safari';
    else if (ua.includes('Edge')) br = 'edge';
    return os + '/' + br;
}

function daysSince(date) {
    return Math.floor((new Date() - new Date(date)) / 86400000).toLocaleString();
}

function getVisitorName() {
    try {
        var tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
        // "Europe/Madrid" → "madrid", "America/New_York" → "new_york"
        var city = tz.split('/').pop().toLowerCase().replace(/[^a-z]/g, '_');
        return city || 'visitor';
    } catch(e) {
        return 'visitor';
    }
}

var DEVICE = getUserAgent();
var VISITOR = getVisitorName();

// Build a prompt fragment: city@device ~/path $
function buildPrompt(path) {
    var f = document.createDocumentFragment();
    f.appendChild(makeSpan('p-user', VISITOR));
    f.appendChild(makeSpan('p-device', '@' + DEVICE));
    f.appendChild(document.createTextNode(' '));
    f.appendChild(makeSpan('p-path', path || '~'));
    f.appendChild(document.createTextNode(' '));
    f.appendChild(makeSpan('p-dollar', '$'));
    f.appendChild(document.createTextNode(' '));
    return f;
}

// ── Prompt with command, waiting for user interaction ──
var bootContainer = document.getElementById('boot');
var launched = false;

// Show prompt + command immediately
var promptLine = document.createElement('div');
promptLine.className = 'line';
promptLine.appendChild(buildPrompt('~'));
promptLine.appendChild(makeSpan('cmd', 'cat profile.txt && cat stack.txt'));
promptLine.appendChild(makeEl('span', 'cursor', ''));
bootContainer.appendChild(promptLine);

function launch() {
    if (launched) return;
    launched = true;
    // Remove cursor from prompt
    var cur = promptLine.querySelector('.cursor');
    if (cur) cur.remove();
    // Build content and reveal chunks sequentially
    buildContent();
    document.getElementById('content').classList.add('entered');
    var i = 0;
    function showNext() {
        if (i < chunks.length) {
            chunks[i].classList.add('visible');
            i++;
            setTimeout(showNext, 80);
        }
    }
    showNext();
}

var pranked = false;
var warned = false;

document.addEventListener('click', function(e) {
    if (e.target.closest('.theme-toggle')) return;
    if (!pranked) return launch();
    // After prank, click also launches
    launch();
});
document.addEventListener('keydown', function(e) {
    if (launched) return;
    if (e.key === 'Enter') return launch();
    if (e.key === 'Tab' || e.key === 'Shift' || e.key === 'Control' || e.key === 'Alt' || e.key === 'Meta' || e.key === 'Escape' || e.key === 'CapsLock' || e.key === 'F1' || e.key === 'F2' || e.key === 'F3' || e.key === 'F4' || e.key === 'F5' || e.key === 'F6' || e.key === 'F7' || e.key === 'F8' || e.key === 'F9' || e.key === 'F10' || e.key === 'F11' || e.key === 'F12') return;
    e.preventDefault();

    if (!pranked) {
        pranked = true;
        // Show prank message
        var pLine = makeLine('mt');
        pLine.style.color = 'var(--red)';
        pLine.style.fontWeight = '600';
        pLine.textContent = 'Wait... did you really think this static page was a working CLI? lmao gotcha';
        bootContainer.appendChild(pLine);

        // Re-show prompt
        var newPrompt = makeLine('mt');
        newPrompt.appendChild(buildPrompt('~'));
        newPrompt.appendChild(makeSpan('cmd', 'cat profile.txt && cat stack.txt'));
        newPrompt.appendChild(makeEl('span', 'cursor', ''));
        bootContainer.appendChild(newPrompt);

        // Remove cursor from old prompt
        var oldCur = promptLine.querySelector('.cursor');
        if (oldCur) oldCur.remove();
        promptLine = newPrompt;
    } else if (!warned) {
        warned = true;
        var wLine = makeLine();
        wLine.style.color = 'var(--orange)';
        wLine.style.fontSize = '0.9em';
        wLine.textContent = '\u26A0 Hint: press ENTER or click anywhere to continue. Your keyboard won\'t help you here ;)';
        bootContainer.appendChild(wLine);
    }
});

// ── Portfolio content — built as terminal output in chunks ──
var chunks = [];

function buildContent() {
    var c = document.getElementById('content');
    var lifeDays = daysSince('1996/05/29');
    var devDays = daysSince('2018/04/01');
    var currentChunk = null;

    function startChunk() {
        currentChunk = document.createElement('div');
        currentChunk.className = 'chunk';
        c.appendChild(currentChunk);
        chunks.push(currentChunk);
    }

    function textLine(text, cls) {
        var l = makeLine(cls);
        l.textContent = text;
        currentChunk.appendChild(l);
    }

    function richLine(parts, cls) {
        var l = makeLine(cls);
        parts.forEach(function(p) {
            if (typeof p === 'string') {
                l.appendChild(document.createTextNode(p));
            } else if (p.el) {
                l.appendChild(p.el);
            } else {
                var s = makeSpan(p.c || '', p.t);
                if (p.click) s.onclick = p.click;
                if (p.style) s.style.cssText = p.style;
                l.appendChild(s);
            }
        });
        currentChunk.appendChild(l);
        return l;
    }

    function expBlock(title, href, dateStr, detail) {
        var titleLine = makeLine('mt');
        titleLine.appendChild(makeSpan('bright', '  '));
        if (href) {
            var a = document.createElement('a');
            a.href = href;
            a.target = '_blank';
            a.className = 'link';
            a.textContent = title;
            titleLine.appendChild(a);
        } else {
            titleLine.appendChild(makeSpan('bright', title));
        }
        currentChunk.appendChild(titleLine);

        var dateLine = makeLine();
        dateLine.appendChild(makeSpan('dim', '  ' + dateStr));
        currentChunk.appendChild(dateLine);

        var detailLine = makeLine();
        detailLine.appendChild(makeSpan('output', '  ' + detail));
        currentChunk.appendChild(detailLine);
    }

    // ─── CHUNK 0: Header ───
    startChunk();
    richLine([{c:'heading',t:'Ken Serikawa'}], 'mt');
    richLine([{c:'subheading',t:'Backend Developer'}], 'mb');

    var emailLine = makeLine();
    emailLine.appendChild(makeSpan('dim', 'email  '));
    var emailSpan = makeSpan('link', 'kenserikawa.dev@gmail.com');
    emailSpan.style.cssText = 'cursor:pointer';
    emailSpan.onclick = function() {
        navigator.clipboard.writeText('kenserikawa.dev@gmail.com');
        toast.classList.add('on');
        setTimeout(function() { toast.classList.remove('on'); }, 2000);
    };
    emailLine.appendChild(emailSpan);
    var toast = makeSpan('toast', 'copied!');
    emailLine.appendChild(toast);
    currentChunk.appendChild(emailLine);

    var linksLine = makeLine();
    linksLine.appendChild(makeSpan('dim', 'links  '));
    var gh = document.createElement('a');
    gh.href = 'https://github.com/kenserikawa';
    gh.target = '_blank';
    gh.rel = 'noopener noreferrer';
    gh.className = 'link';
    gh.textContent = ' GitHub';
    var ghIcon = document.createElement('i');
    ghIcon.className = 'fab fa-github';
    gh.prepend(ghIcon);
    linksLine.appendChild(gh);
    linksLine.appendChild(document.createTextNode('  '));
    var li = document.createElement('a');
    li.href = 'https://www.linkedin.com/in/ken-serikawa-42688a184';
    li.target = '_blank';
    li.rel = 'noopener noreferrer';
    li.className = 'link';
    li.textContent = ' LinkedIn';
    var liIcon = document.createElement('i');
    liIcon.className = 'fab fa-linkedin-in';
    li.prepend(liIcon);
    linksLine.appendChild(li);
    currentChunk.appendChild(linksLine);

    // ─── CHUNK 1: Whoami ───
    startChunk();
    richLine([{c:'heading',t:'whoami'}], 'gap');
    richLine([
        'Bringing ', {c:'accent',t:lifeDays}, ' days of life experience, committed to the ever-evolving field of technology through continuous learning and hands-on problem solving. Currently on day ', {c:'ok',t:devDays}, ' as a tech enthusiast.'
    ], 'indent');

    // ─── CHUNK 2: Interests ───
    startChunk();
    richLine([{c:'heading',t:'interests'}], 'gap');
    textLine('Web development with DDD and TDD Architecture, Container Orchestration,', 'indent');
    textLine('CI/CD, AI-Assisted Development, Blockchain and Machine Learning.', 'indent');

    // ─── CHUNK 3: Experience ───
    startChunk();
    richLine([{c:'heading',t:'experience'}], 'gap');
    expBlock('Backend Developer @ Prime IT', 'https://www.primeit.es/',
        'Currently — Nov 2024',
        'Developing backend services and microservices architectures for enterprise clients, leveraging modern PHP and TypeScript ecosystems with a focus on scalable, maintainable solutions.'
    );
    expBlock('Backend Developer @ Alten', 'https://www.alten.es/',
        'Nov 2024 — Jan 2021',
        'Specialized in developing microservices and middleware solutions for CMS using Symfony and NestJs. Managed cache layers, queues, and events. Led a database migration project transforming NoSQL collections into structured XML formats.'
    );
    expBlock('Full-Stack Developer @ Impactware', 'http://www.impactware.com/',
        'May 2020 — Apr 2019',
        'Developed client-requested applications with data modeling, entity creation, and RESTful API integrations. Conducted web scraping and data enrichment, designed interactive templates.'
    );

    // ─── CHUNK 4: AI Development ───
    startChunk();
    richLine([{c:'heading',t:'ai-development'}], 'gap');

    richLine([{c:'subheading',t:'  AI-Assisted Engineering'}], 'mt');
    textLine('  Prompt Engineering, Claude Code, GitHub Copilot, Agentic Workflows,', 'indent');
    textLine('  AI Code Review, SDD', 'indent');

    richLine([{c:'subheading',t:'  AI Integration'}], 'mt');
    textLine('  LLM API Integration, RAG Pipelines, MCP Servers, Vector Databases,', 'indent');
    textLine('  OpenAI / Anthropic SDKs', 'indent');

    // ─── CHUNK 5: Skills ───
    startChunk();
    richLine([{c:'heading',t:'skills'}], 'gap');

    richLine([{c:'heading',t:'  Languages'}], 'mt');
    richLine([{c:'bright',t:'  PHP '},{c:'dim',t:'[5 years]'},{c:'muted',t:'  Symfony · Laravel'}], 'indent');
    richLine([{c:'bright',t:'  TypeScript '},{c:'dim',t:'[3 years]'},{c:'muted',t:'  NestJs · Express'}], 'indent');
    richLine([{c:'bright',t:'  Rust '},{c:'dim',t:'[~1 year]'},{c:'muted',t:'  Yew · Anchor · Smart Contracts'}], 'indent');

    richLine([{c:'heading',t:'  Backend & Architecture'}], 'mt');
    richLine(['  HTTP Lifecycle, RESTful APIs, OOP, TDD, Hexagonal Arch, DDD,'], 'indent');
    var archLine = makeLine('indent');
    archLine.appendChild(document.createTextNode('  Testing, '));
    var htmxA = document.createElement('a');
    htmxA.href = 'https://htmx.org/';
    htmxA.target = '_blank';
    htmxA.className = 'link';
    htmxA.textContent = 'HTMX';
    archLine.appendChild(htmxA);
    currentChunk.appendChild(archLine);

    richLine([{c:'heading',t:'  Data & Infrastructure'}], 'mt');
    textLine('  MySQL / MariaDB, MongoDB 8.0, Docker, RabbitMQ, Linux, Bash', 'indent');

    richLine([{c:'heading',t:'  Frontend'}], 'mt');
    var feLine = makeLine('indent');
    feLine.appendChild(document.createTextNode('  '));
    [['Next.js','https://nextjs.org/'],['Vue','https://vuejs.org/'],['React','https://reactjs.org/'],['Tailwind','https://tailwindcss.com/']].forEach(function(pair, i) {
        if (i > 0) feLine.appendChild(document.createTextNode(', '));
        var a = document.createElement('a');
        a.href = pair[1];
        a.target = '_blank';
        a.className = 'link';
        a.textContent = pair[0];
        feLine.appendChild(a);
    });
    feLine.appendChild(document.createTextNode(', Bootstrap, Responsive Design'));
    currentChunk.appendChild(feLine);

    richLine([{c:'heading',t:'  CI/CD & DevOps'}], 'mt');
    var ciLine = makeLine('indent');
    ciLine.appendChild(document.createTextNode('  Git, '));
    [['Jenkins','https://www.jenkins.io/'],['GH Actions','https://github.com/features/actions'],['TG Mini Apps','https://core.telegram.org/bots/webapps']].forEach(function(pair, i) {
        if (i > 0) ciLine.appendChild(document.createTextNode(', '));
        var a = document.createElement('a');
        a.href = pair[1];
        a.target = '_blank';
        a.className = 'link';
        a.textContent = pair[0];
        ciLine.appendChild(a);
    });
    currentChunk.appendChild(ciLine);

    // ─── CHUNK 6: Footer (interactive prompt) ───
    startChunk();
    var footerLine = makeLine('gap');
    footerLine.appendChild(buildPrompt('~'));
    var termInput = document.createElement('input');
    termInput.type = 'text';
    termInput.className = 'term-input';
    termInput.setAttribute('autocomplete', 'off');
    termInput.setAttribute('spellcheck', 'false');
    footerLine.appendChild(termInput);
    currentChunk.appendChild(footerLine);

    var snarkMessages = [
        'nice try, but this ain\'t no sandbox buddy',
        'sorry pal, commands here are just for show',
        'you really thought you could execute stuff here? cute',
        'error 418: I\'m a teapot, not a terminal',
        'permission denied: this is a portfolio, not a playground',
        'segfault (just kidding, nothing runs here)',
        'nah. try LinkedIn if you wanna reach me though',
        'bruh. it\'s HTML. what did you expect?'
    ];
    var snarkIndex = 0;

    function handleCommand() {
        var val = termInput.value.trim();
        if (!val) return;
        termInput.value = '';

        // Freeze old prompt: replace input with static text
        var typed = makeSpan('cmd', val);
        footerLine.replaceChild(typed, termInput);

        // Error line
        var errLine = makeLine();
        errLine.style.color = 'var(--red)';
        errLine.textContent = snarkMessages[snarkIndex % snarkMessages.length];
        snarkIndex++;
        c.appendChild(errLine);

        // New prompt with fresh input
        footerLine = makeLine('mt');
        footerLine.appendChild(buildPrompt('~'));
        termInput = document.createElement('input');
        termInput.type = 'text';
        termInput.className = 'term-input';
        termInput.setAttribute('autocomplete', 'off');
        termInput.setAttribute('spellcheck', 'false');
        footerLine.appendChild(termInput);
        c.appendChild(footerLine);
        termInput.focus();

        termInput.addEventListener('keydown', function(ev) {
            if (ev.key === 'Enter') handleCommand();
        });

        window.scrollTo(0, document.body.scrollHeight);
    }

    termInput.addEventListener('keydown', function(ev) {
        if (ev.key === 'Enter') handleCommand();
    });

    // Focus input once footer chunk is visible
    var origShowNext = null;
    setTimeout(function() { termInput.focus(); }, chunks.length * 80 + 200);
}

</script>
